<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 430" role="img" aria-labelledby="title desc">
  <title id="title">Repository demo map</title>
  <desc id="desc">The repository contains demos for 2D shape barycenters, portrait interpolation, voxelized mesh barycenters, and intrinsic Gaussian interpolation on a surface.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f6f6"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#12303a" flood-opacity="0.10"/>
    </filter>
    <style>
      .card { fill: #fff; stroke: #dce7ea; stroke-width: 1.5; filter: url(#shadow); }
      .title { font: 800 25px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17313a; }
      .label { font: 750 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #203f49; }
      .small { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #61777f; }
      .mono { font: 650 14px "SFMono-Regular", Consolas, "Liberation Mono", monospace; fill: #24444e; }
      .grid { stroke: #d2dee2; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1180" height="430" rx="28" fill="url(#bg)"/>
  <text x="590" y="50" text-anchor="middle" class="title">What the demos produce</text>
  <text x="590" y="78" text-anchor="middle" class="small">All commands write generated artifacts to output/.</text>

  <rect x="50" y="120" width="250" height="245" rx="18" class="card"/>
  <text x="175" y="156" text-anchor="middle" class="label">2-D shapes</text>
  <text x="175" y="181" text-anchor="middle" class="mono">make demo-shapes</text>
  <g transform="translate(95 205)">
    <path class="grid" d="M0 0H150M0 30H150M0 60H150M0 90H150M0 120H150M0 150H150M0 0V150M30 0V150M60 0V150M90 0V150M120 0V150M150 0V150"/>
    <circle cx="17" cy="18" r="12" fill="#13b6cf"/>
    <path d="M116 17 L125 37 L147 39 L131 54 L135 76 L116 65 L96 76 L100 54 L84 39 L106 37Z" fill="#ff8a5c"/>
    <path d="M30 125 C30 104, 58 104, 58 125 C58 147, 30 147, 30 125Z" fill="#72c65f"/>
    <path d="M114 123 C138 112, 150 139, 128 152 C104 163, 91 136, 114 123Z" fill="#ffc34d"/>
  </g>

  <rect x="330" y="120" width="250" height="245" rx="18" class="card"/>
  <text x="455" y="156" text-anchor="middle" class="label">Portrait morph</text>
  <text x="455" y="181" text-anchor="middle" class="mono">make demo-portrait</text>
  <g transform="translate(370 215)">
    <rect x="0" y="0" width="70" height="135" rx="10" fill="#f0f2f3"/>
    <rect x="110" y="0" width="70" height="135" rx="10" fill="#f0f2f3"/>
    <path d="M35 29 C55 29 61 51 54 74 C49 95 22 95 16 74 C9 51 15 29 35 29Z" fill="#263942"/>
    <rect x="20" y="83" width="32" height="42" rx="16" fill="#263942"/>
    <path d="M145 28 C166 31 171 54 163 76 C156 97 131 96 126 74 C119 51 125 28 145 28Z" fill="#8f9aa0"/>
    <rect x="128" y="82" width="34" height="43" rx="17" fill="#8f9aa0"/>
    <path d="M80 68 C91 52, 100 52, 110 68" fill="none" stroke="#ffbf42" stroke-width="5" stroke-linecap="round"/>
  </g>

  <rect x="610" y="120" width="250" height="245" rx="18" class="card"/>
  <text x="735" y="156" text-anchor="middle" class="label">Voxel meshes</text>
  <text x="735" y="181" text-anchor="middle" class="mono">make demo-meshes</text>
  <g transform="translate(650 225)">
    <path d="M28 38 L75 12 L132 39 L83 69Z" fill="#8dd3f0"/>
    <path d="M28 38 V96 L83 126 V69Z" fill="#52a9cf"/>
    <path d="M132 39 V96 L83 126 V69Z" fill="#2f7fa9"/>
    <path d="M72 14 V73M118 45 L66 75M48 49 L101 78M83 69 V126" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <circle cx="142" cy="110" r="27" fill="#ffc34d" opacity="0.9"/>
    <circle cx="35" cy="115" r="20" fill="#76d86d" opacity="0.9"/>
  </g>

  <rect x="890" y="120" width="240" height="245" rx="18" class="card"/>
  <text x="1010" y="156" text-anchor="middle" class="label">Mesh Gaussian</text>
  <text x="1010" y="181" text-anchor="middle" class="mono">make demo-gaussian</text>
  <g transform="translate(925 225)">
    <path d="M0 80 C34 14, 86 5, 134 52 C166 84, 195 80, 220 45 C208 117, 152 145, 93 122 C53 107, 30 113, 0 80Z" fill="#dfe9ef" stroke="#9db1bb" stroke-width="2"/>
    <path d="M28 74 L71 42 L111 72 L153 50 L193 72M71 42 L93 122 L111 72 L153 50 L158 126" stroke="#ffffff" stroke-width="2" fill="none"/>
    <circle cx="71" cy="42" r="24" fill="#18b6cc" opacity="0.75"/>
    <circle cx="166" cy="83" r="30" fill="#ffbe42" opacity="0.75"/>
  </g>
</svg>
